<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu contrato — Proposal Inc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --onyx:#1C1C1E; --gold:#C9A84C; --gold-pale:#FAF6EC; --gold-border:#E8D5A3;
      --page:#F5F5F0; --card:#FFFFFF; --ink-1:#1C1C1E; --ink-2:#6B6B70; --ink-3:#9B9B9F;
      --border:#E8E8EA; --border2:#D5D5D8; --success:#2D7A4F; --warn:#B45309; --danger:#C0392B;
      --r:8px; --r-lg:14px;
    }
    body {
      font-family:'Montserrat',system-ui,sans-serif; font-size:14px; line-height:1.6;
      color:var(--ink-1); background:var(--page); -webkit-font-smoothing:antialiased;
      padding:0 0 60px;
    }
    button, input { font-family:inherit; }
    .wrap { max-width:560px; margin:0 auto; padding:0 16px; }

    .top { background:var(--onyx); padding:16px; text-align:center; }
    .top-logo { display:flex; justify-content:center; align-items:center; }
    .top-logo svg { width:110px; height:auto; }
    .top-logo svg path { fill:white; }

    /* Indicador de pasos */
    .pasos { display:flex; gap:6px; margin:18px 0 22px; }
    .paso { flex:1; text-align:center; }
    .paso-bola {
      width:26px; height:26px; border-radius:50%; margin:0 auto 4px;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700;
      background:var(--border); color:var(--ink-3);
    }
    .paso.activo .paso-bola { background:var(--gold); color:var(--onyx); }
    .paso.hecho  .paso-bola { background:var(--onyx); color:#fff; }
    .paso-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-3); }
    .paso.activo .paso-label { color:var(--gold); }

    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; margin-bottom:16px; }
    h1 { font-size:20px; font-weight:800; margin-bottom:6px; }
    h2 { font-size:15px; font-weight:700; margin-bottom:12px; }
    .sub { color:var(--ink-3); font-size:13px; margin-bottom:16px; }

    .banner { border-radius:var(--r); padding:14px 16px; margin-bottom:16px; font-size:13px; font-weight:600; }
    .banner-ok    { background:#D1FAE5; color:#065F46; }
    .banner-info  { background:#DBEAFE; color:#1E40AF; }
    .banner-warn  { background:#FEF3C7; color:#92400E; }
    .banner-gold  { background:var(--gold-pale); color:var(--onyx); border:1px solid var(--gold-border); }

    .resumen-fila { display:flex; justify-content:space-between; gap:14px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .resumen-fila:last-child { border-bottom:none; }
    .resumen-fila .et { color:var(--ink-3); flex-shrink:0; }
    .resumen-fila .vl { font-weight:600; text-align:right; }

    .lista-entregables { list-style:none; }
    .lista-entregables li { font-size:13px; padding:5px 0 5px 20px; position:relative; color:var(--ink-2); }
    .lista-entregables li::before { content:''; position:absolute; left:4px; top:12px; width:6px; height:6px; border-radius:50%; background:var(--gold); }

    .addon-wrap { margin-bottom:8px; }
    .addon {
      display:flex; align-items:center; gap:12px; padding:12px 14px;
      border:1.5px solid var(--border2); border-radius:var(--r); cursor:pointer;
    }
    .addon-wrap .addon { border-radius:var(--r) var(--r) 0 0; border-bottom:none; margin-bottom:0; }
    .addon-wrap.cerrado .addon { border-radius:var(--r); border-bottom:1.5px solid var(--border2); }
    .addon input { width:18px; height:18px; accent-color:var(--gold); flex-shrink:0; }
    .addon-nombre { flex:1; font-size:13px; font-weight:600; }
    .addon-precio { font-size:13px; font-weight:700; color:var(--gold); }
    .addon-toggle-row {
      padding:5px 14px 7px; border:1.5px solid var(--border2); border-top:none;
      cursor:pointer; background:var(--page); display:flex; align-items:center;
    }
    .addon-wrap.cerrado .addon-toggle-row { border-radius:0 0 var(--r) var(--r); }
    .addon-wrap.abierto .addon-toggle-row { border-bottom:none; border-radius:0; }
    .addon-wrap.con-detalle .addon { border-radius:var(--r) var(--r) 0 0 !important; border-bottom:none !important; }
    .addon-toggle { font-size:11px; font-weight:700; color:var(--gold); user-select:none; text-decoration:underline; text-underline-offset:2px; }
    .addon-desc {
      display:none; font-size:11px; color:var(--ink-2); line-height:1.5;
      padding:8px 14px 10px; border:1.5px solid var(--border2); border-top:none;
      border-radius:0 0 var(--r) var(--r); background:var(--page);
    }
    .addon-wrap.abierto .addon-desc { display:block; }
    .addon-incluido { opacity:0.45; pointer-events:none; }
    .btn-individuales {
      width:100%; text-align:left; background:var(--page); border:1px solid var(--border);
      border-radius:var(--r); padding:11px 14px; font-size:12px; font-weight:700;
      color:var(--ink-2); cursor:pointer; display:flex; justify-content:space-between;
      align-items:center; margin-top:4px; font-family:inherit; letter-spacing:0.01em;
    }
    .btn-individuales:hover { border-color:var(--border2); color:var(--ink-1); }

    .precio-box { background:var(--page); border-radius:var(--r); padding:14px 16px; margin:14px 0; }
    .precio-fila { display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
    .precio-fila.total { font-weight:800; font-size:16px; border-top:1.5px solid var(--border2); margin-top:7px; padding-top:9px; }
    .precio-fila.sub { color:var(--ink-2); }

    .acordeon-btn {
      width:100%; text-align:left; background:var(--page); border:1px solid var(--border);
      border-radius:var(--r); padding:12px 14px; font-size:13px; font-weight:700;
      cursor:pointer; display:flex; justify-content:space-between; align-items:center;
    }
    .acordeon-cuerpo { display:none; padding:14px 4px 4px; }
    .acordeon-cuerpo.abierto { display:block; }
    .clausula { margin-bottom:14px; }
    .clausula-t { font-size:12px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px; }
    .clausula-p { font-size:12px; color:var(--ink-2); margin-bottom:5px; }

    .firma-zona { margin-top:8px; }
    .firma-canvas-wrap { position:relative; border:1.5px dashed var(--border2); border-radius:var(--r); background:var(--card); }
    #firma-canvas { width:100%; height:170px; display:block; touch-action:none; border-radius:var(--r); }
    .firma-linea { position:absolute; left:16px; right:16px; bottom:38px; border-bottom:1px solid var(--border2); }
    .firma-hint { position:absolute; left:0; right:0; bottom:16px; text-align:center; font-size:11px; color:var(--ink-3); pointer-events:none; }
    .firma-acciones { display:flex; justify-content:flex-end; margin-top:6px; }
    .btn-link { background:none; border:none; color:var(--ink-3); font-size:12px; font-weight:600; cursor:pointer; text-decoration:underline; }

    .btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      width:100%; padding:15px; border:none; border-radius:var(--r);
      font-size:14px; font-weight:700; cursor:pointer; transition:background 120ms, opacity 120ms;
    }
    .btn-gold { background:var(--gold); color:var(--onyx); }
    .btn-gold:hover { background:#B89238; }
    .btn-dark { background:var(--onyx); color:#fff; }
    .btn-wa { background:#25D366; color:#fff; text-decoration:none; }
    .btn:disabled { opacity:0.45; cursor:not-allowed; }
    .btn-sec {
      display:block; width:100%; text-align:center; padding:13px;
      background:transparent; border:1.5px solid var(--border2); border-radius:var(--r);
      font-size:13px; font-weight:700; color:var(--ink-1); text-decoration:none; cursor:pointer;
    }

    .progreso-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-top:12px; }
    .progreso-fill { height:100%; width:0; background:var(--gold); transition:width 400ms; }

    .pago-dato { display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .pago-dato:last-child { border-bottom:none; }
    .pago-dato .et { color:var(--ink-3); }
    .pago-dato .vl { font-weight:700; text-align:right; word-break:break-all; }
    .pago-dato .vl.clabe { font-family:'Courier New',monospace; font-size:14px; letter-spacing:0.04em; }

    /* Instrucciones de pago por metodo */
    .metodo-acordeon { margin-top:10px; }
    .metodo-acordeon + .metodo-acordeon { margin-top:8px; }
    .metodo-pasos { padding:12px 4px 4px; }
    .metodo-pasos ol { padding-left:20px; }
    .metodo-pasos li { font-size:12px; color:var(--ink-2); padding:3px 0; line-height:1.5; }
    .metodo-pasos .datos-banco { background:var(--page); border-radius:var(--r); padding:10px 12px; margin:8px 0 10px; }
    .metodo-pasos .datos-banco .pago-dato { padding:6px 0; }
    .metodo-pasos .datos-banco .pago-dato:last-child { border-bottom:none; }

    .abono-fila { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); }
    .abono-fila:last-child { border-bottom:none; }
    .abono-monto { font-weight:700; color:var(--success); font-family:'Courier New',monospace; }

    /* Comprobante de pago */
    .comprobante-wrap { margin-bottom:16px; }
    .comprobante-encabezado {
      background:var(--onyx); padding:14px 18px;
      border-radius:var(--r) var(--r) 0 0;
      display:flex; align-items:center; gap:14px;
    }
    .comprobante-encabezado .comp-logo svg { width:70px; height:auto; }
    .comprobante-encabezado .comp-logo svg path { fill:white; }
    .comprobante-label { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); }
    .comprobante-cuerpo { border:1px solid var(--border); border-top:none; padding:16px 18px; border-radius:0 0 var(--r) var(--r); }
    .comprobante-tabla { width:100%; font-size:12px; border-collapse:collapse; margin-bottom:14px; }
    .comprobante-tabla td { padding:6px 0; border-bottom:1px solid var(--border); vertical-align:top; }
    .comprobante-tabla td:last-child { border-bottom:none; }
    .comprobante-tabla .ct-et { color:var(--ink-3); width:42%; }
    .comprobante-tabla .ct-vl { font-weight:600; text-align:right; }
    .comprobante-montos { border-top:1.5px solid var(--border2); padding-top:10px; }
    .comprobante-montos .precio-fila { font-size:13px; }

    .msg { font-size:12px; text-align:center; min-height:18px; margin-top:8px; }
    .msg.error { color:var(--danger); }
    .nota-cliente { background:var(--gold-pale); border:1px solid var(--gold-border); border-radius:var(--r); padding:12px 14px; font-size:13px; color:var(--ink-2); margin:14px 0; }

    /* Cuestionario del cliente */
    .campo-q { margin-bottom:14px; }
    .campo-q label { display:block; font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:5px; }
    .campo-q input, .campo-q textarea {
      width:100%; border:1.5px solid var(--border2); border-radius:var(--r);
      padding:10px 12px; font-size:13px; color:var(--ink-1); background:var(--card);
      transition:border-color 120ms;
    }
    .campo-q input:focus, .campo-q textarea:focus { outline:none; border-color:var(--gold); }
    .campo-q textarea { resize:vertical; min-height:68px; }
    .toggle-sino { display:flex; gap:0; border:1.5px solid var(--border2); border-radius:var(--r); overflow:hidden; margin-top:4px; }
    .toggle-sino button {
      flex:1; padding:9px; border:none; background:var(--card); font-size:13px; font-weight:600;
      color:var(--ink-3); cursor:pointer; transition:background 120ms, color 120ms;
    }
    .toggle-sino button.activo { background:var(--gold); color:var(--onyx); }
    .campo-q-hint { font-size:11px; color:var(--ink-3); margin-top:4px; }
    .origen-opciones { display:flex; flex-wrap:wrap; gap:7px; margin-top:4px; }
    .origen-chip {
      padding:7px 14px; border:1.5px solid var(--border2); border-radius:20px;
      font-size:12px; font-weight:600; color:var(--ink-2); background:var(--card);
      cursor:pointer; transition:border-color 120ms, background 120ms, color 120ms;
      font-family:inherit;
    }
    .origen-chip:hover { border-color:var(--gold-border); }
    .origen-chip.activo { border-color:var(--gold); background:var(--gold-pale); color:var(--onyx); }
    .campo-num-familia { display:none; margin-top:8px; }
    .centro { text-align:center; }
    .oculto { display:none; }
    .pie { text-align:center; font-size:11px; color:var(--ink-3); margin-top:24px; }

    .portal-saludo { font-size:16px; color:var(--ink-2); margin-bottom:16px; }
    .portal-saludo strong { color:var(--gold); font-weight:700; }
    .countdown-evento {
      display:inline-block; background:var(--gold-pale); border:1px solid var(--gold-border);
      border-radius:var(--r); padding:8px 14px; font-size:13px; font-weight:700;
      color:var(--onyx); margin-bottom:12px;
    }

    .addon-combo-badge {
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;
      background:var(--gold-pale); color:var(--gold); border:1px solid var(--gold-border);
      border-radius:4px; padding:2px 6px; margin-left:6px; vertical-align:middle;
    }
    .addon-combo-msg {
      display:none; background:var(--gold-pale); border:1px solid var(--gold-border);
      border-radius:var(--r); padding:10px 14px; font-size:12px; color:var(--onyx);
      margin-bottom:8px; line-height:1.5;
    }
    .addon-incluido { opacity:0.45; pointer-events:none; }
    .addon-incluido .addon-precio { color:var(--ink-3); }
    .addon-incluido-label {
      font-size:11px; font-weight:600; color:var(--ink-3); flex:1; margin-left:0;
    }

    .btn-copy {
      background:var(--page); border:1px solid var(--border2); border-radius:4px;
      padding:3px 8px; font-family:inherit; font-size:10px; font-weight:700;
      color:var(--ink-2); cursor:pointer; white-space:nowrap; transition:all 120ms;
    }
    .btn-copy:hover { border-color:var(--gold); color:var(--gold); }
    .btn-copy.copiado { border-color:var(--success); color:var(--success); background:#E8F5EE; }

    @media print {
      .no-print { display:none !important; }
      body { background:#fff; padding:0; }
      body * { visibility:hidden; }
      .comprobante-print, .comprobante-print * { visibility:visible; }
      .comprobante-print { position:absolute; top:0; left:0; width:100%; }
    }
  </style>
</head>

<script>
// URL del backend desplegado en Apps Script. Pegar despues de desplegar ScriptContratos1_v1.js.
const API = 'https://script.google.com/macros/s/AKfycbwaF0neKxrw8jgeoW7_bkXp0dk2XU3tiWGtE41C9jJhf99m7_-4ovMjWdcPZkNa1kHBPg/exec';

// Las 19 clausulas del contrato. Se muestran en el acordeon de terminos.
const CLAUSULAS = [
  { t:'Primera. Consentimiento', p:['LAS PARTES manifiestan su voluntad para celebrar el presente contrato cuya naturaleza jurídica es la prestación de servicios de producción audiovisual y organización del evento; por lo que EL PRESTADOR DEL SERVICIO se obliga a prestar el servicio conforme a lo estipulado en el presente contrato y su anexo que forma parte integral del mismo, y EL CLIENTE en consecuencia, a pagar un precio cierto y determinado.'] },
  { t:'Segunda. Objeto', p:['El objeto del presente contrato es la prestación de servicios de producción audiovisual y organización del evento, cuyas características y costos se señalan en el ANEXO que forma parte integral del mismo. EL PRESTADOR DEL SERVICIO deberá utilizar todos sus conocimientos técnicos, equipo y materiales adecuados para la mejor realización del servicio solicitado, a fin de obtener resultados óptimos.'] },
  { t:'Tercera. Precio del servicio', p:['LAS PARTES manifiestan su conformidad en que el precio total a pagar por EL CLIENTE, como contraprestación de los servicios contratados, es el señalado en el ANEXO del presente contrato, el cual forma parte integral del mismo.'] },
  { t:'Cuarta. Forma y lugar de pago', p:['Al momento de la firma del presente contrato EL CLIENTE deberá pagar por concepto de anticipo la cantidad que se indica en el ANEXO de este contrato, y el saldo restante en la fecha acordada por LAS PARTES antes de la fecha del evento.','EL CLIENTE efectuará el pago pactado en los términos y condiciones acordados, pudiendo ser en efectivo o mediante transferencia bancaria.','El servicio deberá estar pagado en su totalidad a más tardar tres días hábiles antes del evento.'] },
  { t:'Quinta. Lugar y horario para la prestación del servicio', p:['El lugar, día y hora en que se llevará a cabo el servicio son los señalados en el ANEXO del presente contrato.'] },
  { t:'Sexta. Preparación del evento', p:['EL PRESTADOR DEL SERVICIO será el responsable de la decoración, música e iluminación adecuada del lugar, de acuerdo al servicio contratado.'] },
  { t:'Séptima. Cambio de horario y cancelación', p:['En caso de cualquier cambio de horario, EL CLIENTE deberá notificarlo a EL PRESTADOR DEL SERVICIO con al menos siete días naturales de anticipación a la fecha del evento, sujeto a la disponibilidad de EL PRESTADOR DEL SERVICIO.','EL CLIENTE tendrá derecho a un único reagendamiento, el cual deberá ejercerse antes de la fecha original del evento. La nueva fecha deberá acordarse dentro de los seis meses siguientes a la fecha original y estará sujeta a la disponibilidad de EL PRESTADOR DEL SERVICIO. Transcurrido ese plazo sin que EL CLIENTE haya fijado una nueva fecha, el contrato quedará sin efecto y los pagos realizados no serán reembolsables.','En caso de probabilidad de lluvia igual o superior al 30% según el pronóstico oficial, EL CLIENTE podrá solicitar el reagendamiento hasta 48 horas antes del evento sin que ello consuma el único reagendamiento permitido. Será responsabilidad de EL CLIENTE la revisión del pronóstico del clima. Si EL CLIENTE decide continuar con el evento bajo esas condiciones, acepta que este podrá estar sujeto a ajustes operativos, incluyendo la omisión del drone, la realización de la cena en interiores o el uso de locaciones alternas para el montaje, sin que dichos ajustes constituyan un incumplimiento por parte de EL PRESTADOR DEL SERVICIO. No procederá ninguna cancelación ni reagendamiento posterior a las 48 horas previas al evento.','En ningún caso procederá la devolución de los pagos realizados por EL CLIENTE, independientemente del motivo o la anticipación con que se solicite la cancelación.','Si EL CLIENTE no se presenta el día y hora del evento sin aviso previo, se perderá el derecho al reagendamiento y a cualquier devolución.','En caso de que EL PRESTADOR DEL SERVICIO cancele el evento por causas imputables a él, deberá devolver a EL CLIENTE la totalidad de los pagos recibidos en un plazo no mayor a diez días hábiles, o bien ofrecer una nueva fecha sin penalidad para EL CLIENTE, a elección de este último.','En caso de que EL PRESTADOR DEL SERVICIO se vea imposibilitado para cumplir por causas de fuerza mayor debidamente justificadas y ajenas a su voluntad, ofrecerá a EL CLIENTE una nueva fecha dentro de los seis meses siguientes. Si EL CLIENTE no acepta la nueva fecha, se le devolverá la totalidad de los pagos realizados en un plazo no mayor a diez días hábiles.'] },
  { t:'Octava. Duración', p:['La duración del servicio será la acordada previamente por LAS PARTES, y el tiempo comenzará a correr a partir de la hora señalada en el ANEXO. EL CLIENTE deberá llegar puntualmente a la hora reservada.','Habrá un tiempo de tolerancia de 10 minutos para EL CLIENTE. Transcurrido ese tiempo, EL PRESTADOR DEL SERVICIO no estará obligado a cumplir con el servicio contratado. De común acuerdo, podrá ofrecerse una extensión de tiempo en bloques de 40 minutos, con un costo de $2,000 MXN por bloque adicional.'] },
  { t:'Novena. Entrega del material', p:['EL PRESTADOR DEL SERVICIO se obliga a entregar el material audiovisual resultado del servicio en un periodo no mayor a 15 días hábiles a partir del día siguiente al evento, por medio de una carpeta en almacenamiento en la nube. Se enviará a EL CLIENTE un vínculo de descarga con el cual tendrá acceso a su material.','En caso de que EL CLIENTE haya contratado el servicio de Entrega Express, el material será entregado en un plazo no mayor a 24 horas contadas a partir de la conclusión del evento.'] },
  { t:'Décima. Almacenaje', p:['En caso de que EL CLIENTE no descargue el material en la fecha señalada, transcurridos 14 días naturales posteriores a la fecha de entrega, EL PRESTADOR DEL SERVICIO no se hará responsable del almacenaje del material audiovisual.'] },
  { t:'Décima primera. Obligaciones de las partes', p:['Con base en lo estipulado en el presente Contrato, LAS PARTES se obligan a:','EL PRESTADOR DEL SERVICIO: a) Cumplir con lo establecido en el presente Contrato. b) Informar a EL CLIENTE los precios, condiciones y características del servicio contratado. c) Entregar el material audiovisual en la fecha señalada conforme a lo establecido en este Contrato.','EL CLIENTE: a) Cumplir con lo establecido en el presente Contrato. b) Realizar los pagos conforme a lo pactado en el presente Contrato. c) Presentarse en el lugar del evento el día y hora señalados en el ANEXO.'] },
  { t:'Décima segunda. Causas de rescisión', p:['Son causas de rescisión del presente Contrato: a) Que EL PRESTADOR DEL SERVICIO no cumpla con la entrega de material por causas imputables a él. b) Que EL CLIENTE no realice los pagos de conformidad a lo establecido en el presente contrato a menos de dos días hábiles del evento. c) Que EL CLIENTE no realice el pago del anticipo necesario para hacer la reservación del evento a más tardar dos días después de la fecha del envío del contrato.'] },
  { t:'Décima tercera. Pena convencional', p:['El incumplimiento de cualquiera de las obligaciones establecidas en el presente Contrato generará las consecuencias señaladas en las cláusulas correspondientes, las cuales las partes aceptan expresamente como pena convencional.'] },
  { t:'Décima cuarta. Locación', p:['La locación, decoración, iluminación, música y cena serán responsabilidad de EL PRESTADOR DEL SERVICIO de acuerdo al paquete contratado por EL CLIENTE y a lo señalado en el ANEXO.'] },
  { t:'Décima quinta. Uso del material audiovisual', p:['EL PRESTADOR DEL SERVICIO podrá utilizar el material audiovisual obtenido como resultado del servicio con fines publicitarios, de difusión, de promoción o para redes sociales, salvo que EL CLIENTE manifieste su negativa de forma expresa al momento de la firma del presente Contrato.'] },
  { t:'Décima sexta. Protección de datos personales', p:['Los datos personales recabados en el presente Contrato (nombre, correo electrónico y teléfono) serán utilizados exclusivamente para la ejecución del servicio contratado, el envío de comunicaciones relacionadas con el evento y el cumplimiento de las obligaciones derivadas de este Contrato. Dichos datos podrán ser compartidos únicamente con la locación del evento, en la medida estrictamente necesaria para la coordinación del servicio.','Los datos serán conservados en los sistemas de Proposal Inc hasta que EL CLIENTE solicite expresamente su eliminación, mediante comunicación escrita dirigida a proposalincmx@gmail.com. EL CLIENTE podrá en cualquier momento ejercer sus derechos de acceso, rectificación, cancelación u oposición conforme a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares, a través del mismo medio.'] },
  { t:'Décima séptima. Material entregado y música del evento', p:['El material audiovisual entregado se considera definitivo. EL CLIENTE tendrá derecho a solicitar un único ajuste menor, como el corte de una sección o una modificación ligera al montaje, dentro de los cinco días naturales posteriores a la fecha de entrega del vínculo de descarga. Transcurrido ese plazo, o una vez aplicado el ajuste, la entrega quedará cerrada. No se realizarán nuevas tomas ni regrabaciones como parte de este servicio.','La música utilizada durante la entrada al evento será la que EL CLIENTE indique previamente. En caso de que EL CLIENTE no especifique una canción, EL PRESTADOR DEL SERVICIO seleccionará la música a su criterio, sin que ello constituya un incumplimiento del servicio.'] },
  { t:'Décima octava. Información previa al evento', p:['EL CLIENTE proporcionará la información necesaria para la organización del evento al momento de la firma del presente Contrato. Cualquier modificación a dicha información, incluyendo cambios en la canción del evento, número de invitados o alergias alimentarias, deberá notificarse a EL PRESTADOR DEL SERVICIO con al menos 48 horas de anticipación a la fecha del evento. Transcurrido ese plazo, EL PRESTADOR DEL SERVICIO procederá con la información registrada al momento de la firma, sin que los resultados derivados de datos desactualizados constituyan un incumplimiento del servicio.'] },
  { t:'Décima novena. Restricciones de la locación', p:['EL CLIENTE y sus acompañantes deberán respetar en todo momento las reglas del establecimiento donde se lleve a cabo el evento. En caso de que su incumplimiento derive en la suspensión o interrupción del evento por parte del establecimiento, EL PRESTADOR DEL SERVICIO no será responsable y no procederá devolución ni reagendamiento.'] },
];

let datos      = null;   // respuesta de obtenerPortal
let token      = '';
let enviando   = false;  // proteccion contra doble envio
let firmaCtx   = null;
let hayTrazo   = false;
let familiaAsisteSeleccionado = false;
let seleccionActual = new Set(); // claves de add-ons y combos seleccionados

// ── INICIO ──
async function init() {
  const params = new URLSearchParams(location.search);
  token = params.get('token') || '';
  if (!token) { mostrarError('No se encontró un enlace válido.'); return; }
  try {
    const res = await fetch(API + '?action=obtenerPortal&token=' + encodeURIComponent(token), { redirect: 'follow' });
    const d = await res.json();
    if (!d.ok) { mostrarError(d.error || 'Este enlace no está disponible.'); return; }
    // Limpia el token de la URL solo si el fetch fue exitoso.
    // Token se mantiene en la URL para que el cliente pueda guardar y regresar al enlace.
    datos = d;
    render();
  } catch (e) {
    mostrarError('No se pudo cargar el contrato. Revisa tu conexión e inténtalo de nuevo.');
  }
}

function mostrarError(texto) {
  document.getElementById('cargando').classList.add('oculto');
  document.getElementById('app').classList.add('oculto');
  const box = document.getElementById('error-box');
  box.classList.remove('oculto');

  return '<ul class="lista-entregables">' + partes.map(function(p) {

}

// Actualiza seleccionActual cuando el cliente marca o desmarca un add-on.
function onAddonChange(clave) {

  if (!el) return;

    seleccionActual.add(clave);

    seleccionActual.delete(clave);
  }
  resolverYActualizar();
}

// Detecta upgrades a combo, actualiza el DOM y recalcula el precio.
function resolverYActualizar() {
  const addons   = datos.addonsDisponibles || [];
  const addonMap = {};
  addons.forEach(function(a) { addonMap[a.clave] = a; });

  // Combos ordenados de mayor a menor componentes para que el mas grande tenga prioridad.
  const combos = addons
    .filter(function(a) { return a.componentes && a.componentes.length > 0; })
    .slice()
    .sort(function(a, b) { return b.componentes.length - a.componentes.length; });

  // Auto-upgrade: si todos los componentes de un combo estan en seleccionActual
  // como add-ons INDIVIDUALES DIRECTOS (no como partes expandidas de otro combo),
  // reemplazarlos por el combo. Esto evita que seleccionar un combo mayor
  // active automaticamente los sub-combos que cubre.
  let huboUpgrade = true;
  let mensajesUpgrade = [];
  while (huboUpgrade) {
    huboUpgrade = false;
    combos.forEach(function(combo) {
      if (seleccionActual.has(combo.clave)) return;
      const todosDirectos = combo.componentes.every(function(c) {
        return seleccionActual.has(c);
      });
      if (!todosDirectos) return;
      combo.componentes.forEach(function(c) { seleccionActual.delete(c); });
      seleccionActual.add(combo.clave);
      mensajesUpgrade.push(combo.nombre);
      huboUpgrade = true;
    });
  }

  // Determina que items quedan cubiertos por los combos seleccionados:
  // sus componentes individuales y los sub-combos cuyos componentes
  // estan todos dentro del combo mayor.
  const cubiertos = new Set();
  seleccionActual.forEach(function(clave) {
    const a = addonMap[clave];
    if (a && a.componentes) {
      a.componentes.forEach(function(c) { cubiertos.add(c); });
    }
  });
  combos.forEach(function(combo) {
    if (seleccionActual.has(combo.clave)) return;
    if (combo.componentes.every(function(c) { return cubiertos.has(c); })) {
      cubiertos.add(combo.clave);
    }
  });

  // Actualiza el estado visual de cada checkbox.
  document.querySelectorAll('.addon-check').forEach(function(el) {
    const clave = el.value;
    const label = document.getElementById('addon-label-' + clave);
    if (cubiertos.has(clave)) {
      el.checked  = false;
      el.disabled = true;
      if (label) label.classList.add('addon-incluido');
    } else {
      el.checked  = seleccionActual.has(clave);
      el.disabled = false;
      if (label) label.classList.remove('addon-incluido');
    }
  });

  // Muestra el mensaje de upgrade si ocurrio alguno.
  const msgEl = document.getElementById('addon-combo-msg');
  if (msgEl) {
    if (mensajesUpgrade.length > 0) {
      msgEl.textContent = 'Se seleccionó el ' + mensajesUpgrade.join(' y el ') +
        ' porque incluye los mismos servicios a un precio menor.';
      msgEl.style.display = 'block';
    } else {
      msgEl.style.display = 'none';
    }
  }

  // Calcula el precio total con los add-ons y combos seleccionados.
  const base = parseFloat(datos.precio) || 0;
  let addTotal = 0;
  seleccionActual.forEach(function(clave) {
    const a = addonMap[clave];
    if (a) addTotal += parseFloat(a.precio) || 0;
  });
  const total    = base + addTotal;
  // Si el cliente agrega add-ons, el anticipo se recalcula manteniendo la misma
  // proporcion que Bruno configuro al crear el contrato (no forzar al 50%).
  const ratioAnticipoPortal = base > 0
    ? Math.min(1, (parseFloat(datos.anticipo) || 0) / base)
    : 0.5;
  const anticipo = addTotal > 0 ? Math.round(total * ratioAnticipoPortal) : (parseFloat(datos.anticipo) || 0);
  const restante = Math.max(0, total - anticipo);
  const pct      = total > 0 ? Math.round(anticipo / total * 100) : 0;

  document.getElementById('precio-box').innerHTML =
    '<div class="precio-fila sub"><span>Precio base</span><span>' + fmxn(base) + '</span></div>' +
    (addTotal > 0 ? '<div class="precio-fila sub"><span>Servicios adicionales</span><span>' + fmxn(addTotal) + '</span></div>' : '') +
    '<div class="precio-fila total"><span>Total</span><span>' + fmxn(total) + '</span></div>' +
    '<div class="precio-fila sub" style="margin-top:6px"><span>Anticipo (' + pct + '%)</span><span>' + fmxn(anticipo) + '</span></div>' +
    '<div class="precio-fila sub"><span>Saldo restante</span><span>' + fmxn(restante) + '</span></div>';
}

// ── FIRMA (canvas) ──
function initFirma() {
  const canvas = document.getElementById('firma-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  firmaCtx = ctx;
  hayTrazo = false;

  function ajustar() {
    const dpr  = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1C1C1E';
    if (hayTrazo) {
      hayTrazo = false;
      actualizarBtnFirmar();
      const hint = document.getElementById('firma-hint');
      if (hint) hint.style.display = '';
    }
  }
  ajustar();
  new ResizeObserver(ajustar).observe(canvas);

  let dibujando = false;
  function pos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  canvas.addEventListener('pointerdown', function(e) {
    dibujando = true;
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('pointermove', function(e) {
    if (!dibujando) return;
    const p = pos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    if (!hayTrazo) {
      hayTrazo = true;
      actualizarBtnFirmar();
      const hint = document.getElementById('firma-hint');
      if (hint) hint.style.display = 'none';
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('pointerup', function() { dibujando = false; });
  canvas.addEventListener('pointerleave', function() { dibujando = false; });
}

function limpiarFirma() {
  const canvas = document.getElementById('firma-canvas');
  if (!canvas || !firmaCtx) return;
  firmaCtx.clearRect(0, 0, canvas.width, canvas.height);
  hayTrazo = false;
  actualizarBtnFirmar();
  const hint = document.getElementById('firma-hint');
  if (hint) hint.style.display = '';
}

async function firmarContrato() {
  if (enviando) return;
  const correoCliente = (document.getElementById('inp-correo-cliente') || {}).value || '';
  if (!hayTrazo) { setMsg('msg-firma', 'Dibuja tu firma antes de continuar.', 'error'); return; }
  if (!correoCliente.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correoCliente.trim())) {
    setMsg('msg-firma', 'Necesitamos un correo electrónico válido para enviarte el contrato firmado.', 'error');
    return;
  }
  enviando = true;

  const btn   = document.getElementById('btn-firmar');
  const track = document.getElementById('progreso-track');
  const fill  = document.getElementById('progreso-fill');
  btn.disabled = true;
  btn.textContent = 'Procesando...';
  track.classList.remove('oculto');
  fill.style.width = '70%';
  setMsg('msg-firma', '', '');

  const firmaBase64 = document.getElementById('firma-canvas').toDataURL('image/png');
  const adicionales = [];
  seleccionActual.forEach(function(c) { adicionales.push(c); });

  try {
    const res = await fetch(API, {
      method  : 'POST',
      headers : { 'Content-Type': 'text/plain' },
      body    : JSON.stringify({
        action              : 'manejarFirmaCliente',
        token               : token,
        firmaBase64         : firmaBase64,
        adicionales         : adicionales,
        nombrePareja        : (document.getElementById('inp-nombre-pareja') || {}).value || '',
        cancionEvento       : (document.getElementById('inp-cancion') || {}).value || '',
        familiaAsiste       : familiaAsisteSeleccionado,
        familiaNumero       : familiaAsisteSeleccionado
          ? (parseInt(((document.getElementById('inp-familia-num') || {}).value || '0'), 10) || 0)
          : 0,
        alergiasAlimentarias: (document.getElementById('inp-alergias') || {}).value || '',
        origenCliente       : (document.getElementById('inp-origen') || {}).value || '',
        correoCliente       : ((document.getElementById('inp-correo-cliente') || {}).value || '').trim(),
        telefonoCliente     : ((document.getElementById('inp-telefono-cliente') || {}).value || '').trim(),
      }),
      redirect: 'follow',
    });
    const d = await res.json();
    if (!d.ok) throw new Error(d.error || 'No se pudo procesar la firma.');
    fill.style.width = '100%';
    mostrarConfirmacionFirma();
    enviando = false;
  } catch (e) {
    enviando = false;
    btn.disabled = false;
    btn.textContent = 'Firmar contrato';
    track.classList.add('oculto');
    fill.style.width = '0';
    const msg = (e.message || '').toLowerCase().indexOf('ya fue firmado') !== -1
      ? 'Tu contrato ya fue procesado. Recarga la página para continuar.'
      : 'Error al enviar la firma. Intenta de nuevo.';
    setMsg('msg-firma', msg, 'error');
  }
}

  document.getElementById('contenido').innerHTML =

    '</div>';
}

// ── COMPROBANTE DE PAGO ──
// Genera el HTML interno del comprobante (encabezado + tabla + montos + abonos).
// El caller decide si lo muestra directo o dentro de un acordeon.
function htmlComprobante(total, abonado, saldo) {
  const d = datos;
  const abonosHtml = (d.abonos && d.abonos.length)
    ? d.abonos.map(function(a) {
        return '<div class="abono-fila"><div>' +
          '<div style="font-weight:600;font-size:13px">' + esc(a.metodo || 'Pago') + '</div>' +
          '<div style="font-size:11px;color:var(--ink-3)">' + fmxnFecha(a.fecha) + '</div></div>' +
          '<div class="abono-monto">' + fmxn(a.monto) + '</div></div>';
      }).join('')
    : '<p style="font-size:12px;color:var(--ink-3)">Sin pagos registrados.</p>';

  // Clonar el logo completo del encabezado para que el comprobante muestre el wordmark entero.
  // Se usa XMLSerializer para preservar namespaces SVG en Firefox.
  // La CSS .comprobante-encabezado .comp-logo svg path { fill:white } maneja el color.
  const svgEl = document.querySelector('.top-logo svg');
  const svgStr = svgEl ? (new XMLSerializer().serializeToString(svgEl)) : '';
  const logoHtml = svgStr ? '<div class="comp-logo">' + svgStr + '</div>' : '';

  return '<div class="comprobante-encabezado">' +
      logoHtml +
      '<div>' +
        '<div class="comprobante-label">Comprobante de pago</div>' +
        '<div style="color:white;font-size:12px;font-weight:600;margin-top:2px">Proposal Inc</div>' +
      '</div>' +
    '</div>' +
    '<div class="comprobante-cuerpo">' +
      '<table class="comprobante-tabla">' +
        '<tr><td class="ct-et">Cliente</td><td class="ct-vl">' + esc(d.nombre || '') + '</td></tr>' +
        '<tr><td class="ct-et">Folio</td><td class="ct-vl">' + esc(d.folio || '') + '</td></tr>' +
        '<tr><td class="ct-et">Fecha del evento</td><td class="ct-vl">' + fmxnFechaLarga(d.fechaEvento) + '</td></tr>' +
        (d.locacion ? '<tr><td class="ct-et">Locación</td><td class="ct-vl">' + esc(d.locacion) + '</td></tr>' : '') +
        '<tr><td class="ct-et">Servicio</td><td class="ct-vl">' + esc(d.paqueteNombre || 'Servicio personalizado') + '</td></tr>' +
      '</table>' +
      '<div class="comprobante-montos">' +
        (function() {
          var lineas = '';
          // Add-ons aceptados al firmar.
          var firmados = d.adicionales || [];
          firmados.forEach(function(a) {
            lineas += '<div class="precio-fila sub"><span>' + esc(a.nombre) + '</span><span>' + fmxn(a.precio) + '</span></div>';
          });
          // Servicios agregados post-firma.
          var extras = d.addonsExtra || [];
          extras.forEach(function(a) {
            lineas += '<div class="precio-fila sub"><span>' + esc(a.nombre) + '</span><span>' + fmxn(a.precio) + '</span></div>';
          });
          return lineas;
        })() +
        '<div class="precio-fila sub"><span>Total del contrato</span><span>' + fmxn(total) + '</span></div>' +
        '<div class="precio-fila sub" style="color:var(--success)"><span>Total pagado</span><span>' + fmxn(abonado) + '</span></div>' +
        '<div class="precio-fila total"><span>Saldo pendiente</span><span>' + fmxn(saldo) + '</span></div>' +
      '</div>' +
      '<div style="margin-top:14px">' +
        '<p style="font-size:12px;font-weight:700;color:var(--ink-3);margin-bottom:8px">Historial de pagos</p>' +
        abonosHtml +
      '</div>' +
    '</div>';
}

// Abre el acordeon del comprobante (si aplica) y llama window.print().
// Espera un frame + 50ms para que el navegador pinte el acordeon antes del snapshot de impresion.
function imprimirComprobante(acordeonId) {
  var eraAbierto = true;
  var cuerpo = acordeonId ? document.getElementById(acordeonId) : null;
  if (cuerpo) {
    eraAbierto = cuerpo.classList.contains('abierto');
    if (!eraAbierto) cuerpo.classList.add('abierto');
  }
  requestAnimationFrame(function() {
    setTimeout(function() {
      window.print();
      if (cuerpo && !eraAbierto) {
        setTimeout(function() { cuerpo.classList.remove('abierto'); }, 200);
      }
    }, 50);
  });
}

function parseLinksExtra(texto) {
  if (!texto) return [];
  return String(texto).split('\n').map(function(l) { return l.trim(); }).filter(Boolean).map(function(l) {
    const i = l.indexOf('|');
    if (i !== -1) return { etiqueta: l.substring(0, i).trim(), url: l.substring(i + 1).trim() };
    return { etiqueta: 'Enlace adicional', url: l };
  }).filter(function(x) { return /^https?:\/\//i.test(x.url); });
}

// ── HELPERS ──
function saludoHtml(nombre) {
  // BUG-012: usar el nombre completo en el saludo, sin split.
  const n = String(nombre || '').trim();
  if (!n) return '';
  return '<p class="portal-saludo">Hola, <strong>' + esc(n) + '</strong>.</p>';
}

function contadorDiasEvento(fechaStr) {
  // BUG-002: fechaStr puede venir como ISO completo ("2026-05-29T19:00:00.000Z").
  // Extraer solo YYYY-MM-DD para evitar que la concatenacion produzca un string invalido.
  if (!fechaStr) return '';
  const soloFecha = String(fechaStr).substring(0, 10);
  if (!/^\d{4}-\d{2}-\d{2}$/.test(soloFecha)) return '';
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
  const evento = new Date(soloFecha + 'T00:00:00'); evento.setHours(0, 0, 0, 0);
  const diff = Math.round((evento - hoy) / 86400000);
  if (isNaN(diff) || diff < 0) return '';
  if (diff === 0) return '<div class="countdown-evento">Tu evento es hoy.</div>';
  return '<div class="countdown-evento">Faltan <strong>' + diff + '</strong> día' + (diff === 1 ? '' : 's') + ' para tu evento.</div>';
}

function primerNombre() {
  return String(datos.nombre || '').split(' ')[0] || 'que gusto';
}
function fmxn(val) {
  const num = parseFloat(val) || 0;
  return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 }).format(num);
}
function fmxnHora(val) {
  if (!val) return '';
  const s = String(val);
  // Si viene como ISO (ej. "1899-12-31T14:16:00Z"), extraer solo HH:MM
  if (s.indexOf('T') !== -1) {
    const d = new Date(s);
    if (!isNaN(d)) {
      // Usar UTC para evitar desfase por zona horaria cuando el backend emite 'Z'.
      const h = d.getUTCHours(), m = d.getUTCMinutes();
      const ampm = h >= 12 ? 'p.m.' : 'a.m.';
      const h12 = h % 12 || 12;
      return h12 + ':' + String(m).padStart(2, '0') + ' ' + ampm;
    }
  }
  // Si viene como "HH:MM" del input type="time"
  const partes = s.match(/^(\d{1,2}):(\d{2})/);
  if (partes) {
    const h = parseInt(partes[1]), m = parseInt(partes[2]);
    const ampm = h >= 12 ? 'p.m.' : 'a.m.';
    const h12 = h % 12 || 12;
    return h12 + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }
  return s;
}
function fmxnFecha(val) {
  if (!val) return '—';
  const d = new Date(val);
  if (isNaN(d)) return String(val);
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}
function fmxnFechaLarga(val) {
  if (!val) return '—';
  // Tomar solo YYYY-MM-DD y anclar al mediodia local para evitar desfase de dia en Safari iOS.
  const solo = String(val).substring(0, 10);
  const d = new Date(solo + 'T12:00:00');
  if (isNaN(d)) return String(val);
  return d.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setMsg(id, text, tipo) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg' + (tipo ? ' ' + tipo : '');
}

function copiarTextoId(elementoId, btn) {
  var txt = (document.getElementById(elementoId) || {textContent:''}).textContent.trim();
  if (!btn) { navigator.clipboard.writeText(txt).catch(function() {}); return; }
  var orig = btn.textContent;
  navigator.clipboard.writeText(txt).then(function() {
    btn.textContent = 'Copiado';
    btn.classList.add('copiado');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('copiado'); }, 2500);
  }).catch(function() {
    btn.textContent = 'Copia manualmente';
    setTimeout(function() { btn.textContent = orig; }, 2500);
  });
}
