<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Disponibilidad Safi — Captura</title>
<style>
:root {
  --bg: #f7f7f5;
  --surface: #ffffff;
  --border: #e6e6e2;
  --text: #1a1a1a;
  --text-muted: #6b6b66;
  --libre: #2f9e6b;
  --libre-soft: #e3f3ec;
  --parcial: #d49224;
  --parcial-soft: #fbeed5;
  --bloqueada: #4a4a48;
  --bloqueada-soft: #e1e1dd;
  --accent: #1a1a1a;
  --danger: #c0392b;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
  --radius-card: 14px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── LOGIN ── */
#pantalla-login {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.login-box {
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: var(--shadow);
}
.login-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
.login-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
.login-select, .login-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  margin-bottom: 14px;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}
.login-select:focus, .login-input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-top: 4px;
}
.error-login { font-size: 12px; color: var(--danger); min-height: 18px; margin-top: -8px; margin-bottom: 10px; }

/* ── APP ── */
#pantalla-app { display: none; }

.phone-wrap {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header.top {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px 12px;
}
.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 10px;
}
.btn-back {
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  flex-shrink: 0;
  padding: 4px 0;
}
.top-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  flex: 1;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn-guardar {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 999px;
  padding: 9px 18px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
}
.btn-guardar:disabled { background: var(--border); color: var(--text-muted); cursor: default; }

.meses {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.mes-pill {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  flex: 1;
  font-family: inherit;
  white-space: nowrap;
}
.mes-pill.activo { background: var(--accent); color: white; border-color: var(--accent); }

.modo-row {
  display: flex;
  gap: 6px;
}
.btn-modo {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.btn-modo.activo { background: var(--bg); color: var(--text); border-color: var(--text); font-weight: 600; }

/* ── MAIN ── */
main {
  flex: 1;
  padding: 16px 20px 80px;
}

/* ── SECCIONES ── */
.section { margin-bottom: 16px; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px 10px;
}
.section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.section-count { font-size: 12px; color: var(--text-muted); }

.fechas {
  background: var(--surface);
  border-radius: var(--radius-card);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.vacio {
  padding: 18px 16px;
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
}

/* ── FECHA ROW ── */
.fecha-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: relative;
  overflow: hidden;
  touch-action: pan-y;
  user-select: none;
  -webkit-user-select: none;
  min-height: 60px;
}
.fecha-row:last-child { border-bottom: none; }

.fecha-row.compacta { padding: 10px 16px; min-height: 48px; }

.fecha-row.cambiada {
  background: linear-gradient(to right, #fffbea 0%, var(--surface) 35%);
}
.fecha-row.pasada { opacity: 0.4; }

.fecha-label { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.fecha-dia { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.fecha-row.compacta .fecha-dia { font-size: 14px; font-weight: 500; }
.fecha-nota { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.fecha-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* Liberar button (desktop hover, hidden by default) */
.btn-liberar {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
}
@media (hover: hover) {
  .fecha-row.bloqueada-row:hover .btn-liberar {
    visibility: visible;
    opacity: 1;
  }
}

/* Swipe background (shows while swiping) */
.swipe-bg {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 80px;
  background: var(--libre-soft);
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 16px;
  opacity: 0;
  transition: opacity 0.1s;
  pointer-events: none;
}
.swipe-bg svg { color: var(--libre); }
.fecha-row.swiping .swipe-bg { opacity: 1; }

/* Chips */
.chip {
  border: none;
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  min-width: 108px;
  min-height: 38px;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  flex-shrink: 0;
}
.chip:active:not(:disabled) { transform: scale(0.96); }
.chip:disabled { cursor: default; }
.chip.libre     { background: var(--libre-soft);     color: var(--libre); }
.chip.parcial   { background: var(--parcial-soft);   color: var(--parcial); }
.chip.bloqueada { background: var(--bloqueada-soft); color: var(--bloqueada); }

/* Toggle entresemana */
.toggle-btn {
  width: 100%;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius-card);
  padding: 14px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.toggle-btn svg { transition: transform 0.2s; }
.toggle-btn.abierto svg { transform: rotate(180deg); }

/* Loading */
.loading-row {
  padding: 18px 16px;
  font-size: 14px;
  color: var(--text-muted);
  text-align: center;
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Help */
.help {
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  margin-top: 20px;
  line-height: 1.6;
}

/* ── CONSULTA MODE ── */
.consulta-wrap { display: flex; flex-direction: column; gap: 16px; }
.consulta-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 8px 4px 6px;
}
.consulta-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.consulta-item:last-child { border-bottom: none; }
.consulta-dia { font-size: 15px; font-weight: 500; }
.consulta-estado {
  font-size: 13px;
  font-weight: 600;
  border-radius: 999px;
  padding: 5px 12px;
}
.consulta-estado.libre     { background: var(--libre-soft);     color: var(--libre); }
.consulta-estado.parcial   { background: var(--parcial-soft);   color: var(--parcial); }
.consulta-estado.bloqueada { background: var(--bloqueada-soft); color: var(--bloqueada); }

.btn-copiar {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-card);
  padding: 16px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-top: 8px;
}
.btn-copiar:active { opacity: 0.85; }

/* ── DIFF OVERLAY ── */
.diff-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: flex-end;
  z-index: 100;
}
.diff-overlay.visible { display: flex; }

.diff-panel {
  background: var(--surface);
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 36px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.22s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.diff-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.diff-title { font-size: 20px; font-weight: 700; margin-bottom: 3px; letter-spacing: -0.01em; }
.diff-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 18px; }

.diff-list {
  background: var(--bg);
  border-radius: var(--radius-card);
  padding: 4px 14px;
  margin-bottom: 16px;
}
.diff-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.diff-item:last-child { border-bottom: none; }
.diff-fecha { font-size: 15px; font-weight: 500; flex-shrink: 0; }
.diff-cambio { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.diff-chip {
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
}
.arrow-icon { color: var(--text-muted); font-size: 14px; font-weight: 700; }

.diff-actions { display: flex; flex-direction: column; gap: 8px; }
.btn-confirmar {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius-card);
  padding: 15px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  width: 100%;
}
.btn-confirmar:disabled { background: var(--border); color: var(--text-muted); cursor: default; }
.btn-volver {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 15px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  width: 100%;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: white;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s, transform 0.22s;
  z-index: 200;
  white-space: nowrap;
}
.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--danger); }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="pantalla-login">
  <div class="login-box">
    <h1>Disponibilidad Safi</h1>
    <p class="login-sub">Acceso para el equipo de Proposal Inc</p>

    <label class="login-label" for="login-usuario">Nombre</label>
    <select class="login-select" id="login-usuario">
      <option value="">Selecciona tu nombre</option>
      <option value="Bruno">Bruno</option>
      <option value="Fernanda">Fernanda</option>
      <option value="Danna">Danna</option>
    </select>

    <label class="login-label" for="login-pw">Contraseña</label>
    <input class="login-input" id="login-pw" type="password" placeholder="Contraseña" autocomplete="current-password">

    <div class="error-login" id="error-login"></div>
    <button class="btn-login" id="btn-login-submit">Ingresar</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="pantalla-app">
<div class="phone-wrap">

  <header class="top">
    <div class="top-row">
      <a class="btn-back" href="admin.html">&#8592; Volver</a>
      <span class="top-title">Disponibilidad Safi</span>
      <button class="btn-guardar" id="btnGuardar" disabled>Guardar</button>
    </div>
    <div class="meses" id="mesesPills"></div>
    <div class="modo-row">
      <button class="btn-modo activo" id="btnModoCaptura" onclick="setModo('captura',this)">Captura</button>
      <button class="btn-modo" id="btnModoConsulta" onclick="setModo('consulta',this)">Consulta</button>
    </div>
  </header>

  <!-- Modo captura -->
  <main id="mainCaptura">
    <section class="section">
      <div class="section-header">
        <span class="section-title">Fines de semana</span>
        <span class="section-count" id="findesCount"></span>
      </div>
      <div class="fechas" id="findesList"></div>
    </section>

    <section class="section" id="secEntresemana">
      <button class="toggle-btn" id="toggleEntresemana" onclick="toggleEntresemana()">
        <span id="toggleEntresemanaLabel">Mostrar entresemana</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="fechas" id="entresemanaList" style="display:none; margin-top:8px;"></div>
    </section>

    <p class="help">
      Toca el chip para cambiar entre Libre y Parcial, o para bloquear.<br>
      Para desbloquear una fecha, desliza la fila hacia la derecha.
    </p>
  </main>

  <!-- Modo consulta -->
  <main id="mainConsulta" style="display:none">
    <div class="consulta-wrap" id="consultaWrap"></div>
    <button class="btn-copiar" onclick="copiarRespuesta()">Copiar respuesta para WhatsApp</button>
  </main>

</div><!-- phone-wrap -->
</div><!-- pantalla-app -->

<!-- ── DIFF OVERLAY ── -->
<div class="diff-overlay" id="diffOverlay">
  <div class="diff-panel">
    <div class="diff-handle"></div>
    <p class="diff-title">Confirmar cambios</p>
    <p class="diff-subtitle" id="diffSubtitle"></p>
    <div class="diff-list" id="diffList"></div>
    <div class="diff-actions">
      <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarGuardar()">Confirmar y guardar</button>
      <button class="btn-volver" onclick="cerrarDiff()">Volver a editar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Configuración ──
const API      = 'https://script.google.com/macros/s/AKfycbwaF0neKxrw8jgeoW7_bkXp0dk2XU3tiWGtE41C9jJhf99m7_-4ovMjWdcPZkNa1kHBPg/exec';
const PASSWORD = 'framedock';

const MESES_NOMBRES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_CORTO    = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DIAS_LARGO    = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const ESTADOS       = ['libre','parcial','bloqueada'];
const ETIQUETAS     = { libre: 'Libre', parcial: 'Parcial', bloqueada: 'Bloqueada' };
const ETIQUETAS_WA  = { libre: 'disponibilidad completa', parcial: 'disponibilidad parcial', bloqueada: 'sin disponibilidad' };

let usuario = '';
let mesActivo = null;   // { year, month } month = 0-based
let estadoGuardado = {}; // { 'YYYY-MM-DD': estado } — solo fechas no libres
let estadoActual   = {}; // { 'YYYY-MM-DD': estado } — estado en edición
let cargado        = {}; // { 'YYYY-MM': true } — meses ya cargados
let modoActual     = 'captura';
let entresemanaVisible = false;

// ── Utilidades de fecha ──
function hoyStr() {
  const d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}
function pad2(n) { return String(n).padStart(2, '0'); }
function fechaStr(y, m1, d) { return y + '-' + pad2(m1) + '-' + pad2(d); }
function getMesKey(year, month) { return year + '-' + pad2(month + 1); }

function getDiasDelMes(year, month) {
  const dias = [];
  const total = new Date(year, month + 1, 0).getDate();
  for (let d = 1; d <= total; d++) {
    const fecha = fechaStr(year, month + 1, d);
    const dow   = new Date(year, month, d).getDay(); // 0=dom, 6=sab
    const label = DIAS_CORTO[dow] + ' ' + d;
    dias.push({ fecha, dow, label, esFinde: dow === 0 || dow === 6 });
  }
  return dias;
}

function getMesLabel(year, month) {
  return MESES_NOMBRES[month];
}

function getMesesActivos() {
  const meses = [];
  const base = new Date();
  for (let i = 0; i < 3; i++) {
    const d = new Date(base.getFullYear(), base.getMonth() + i, 1);
    meses.push({ year: d.getFullYear(), month: d.getMonth() });
  }
  return meses;
}

function getEstado(fecha) { return estadoActual[fecha] || 'libre'; }
function getGuardado(fecha) { return estadoGuardado[fecha] || 'libre'; }
function esCambiada(fecha) { return getEstado(fecha) !== getGuardado(fecha); }
function esPasado(fecha) { return fecha < hoyStr(); }

// ── Cambios ──
function getCambios() {
  const hoy = hoyStr();
  const cambios = [];
  const procesados = new Set();

  // Cambios sobre fechas en estadoActual
  Object.keys(estadoActual).forEach(fecha => {
    if (fecha < hoy) return;
    procesados.add(fecha);
    if (estadoActual[fecha] !== (estadoGuardado[fecha] || 'libre')) {
      cambios.push({ fecha, antes: estadoGuardado[fecha] || 'libre', ahora: estadoActual[fecha] });
    }
  });

  // Fechas guardadas no libres que el usuario pudo haber regresado a libre eliminando de estadoActual
  // (si se eliminan de estadoActual, se tratan como 'libre')
  Object.keys(estadoGuardado).forEach(fecha => {
    if (fecha < hoy) return;
    if (procesados.has(fecha)) return;
    // Si ya no está en estadoActual, asume 'libre'
    if (estadoGuardado[fecha] !== 'libre') {
      cambios.push({ fecha, antes: estadoGuardado[fecha], ahora: 'libre' });
    }
  });

  cambios.sort((a, b) => a.fecha < b.fecha ? -1 : 1);
  return cambios;
}

function getTotalCambios() { return getCambios().length; }

// ── Login ──
function intentarLogin() {
  const usr = document.getElementById('login-usuario').value;
  const pw  = document.getElementById('login-pw').value;
  const err = document.getElementById('error-login');
  if (!usr) { err.textContent = 'Selecciona tu nombre.'; return; }
  if (pw !== PASSWORD) { err.textContent = 'Contraseña incorrecta.'; return; }
  err.textContent = '';
  usuario = usr;
  try { localStorage.setItem('pi_disp_ok', '1'); localStorage.setItem('pi_disp_usr', usr); } catch (e) {}
  abrirApp();
}

function abrirApp() {
  document.getElementById('pantalla-login').style.display = 'none';
  document.getElementById('pantalla-app').style.display = 'block';
  iniciarApp();
}

document.getElementById('btn-login-submit').addEventListener('click', intentarLogin);
document.getElementById('login-pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') intentarLogin();
});

// ── Inicialización ──
function iniciarApp() {
  const meses = getMesesActivos();
  mesActivo = meses[0];
  renderPills(meses);
  cargarMes(mesActivo.year, mesActivo.month);
}

function renderPills(meses) {
  const container = document.getElementById('mesesPills');
  container.innerHTML = '';
  meses.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mes-pill' + (i === 0 ? ' activo' : '');
    btn.textContent = getMesLabel(m.year, m.month);
    btn.dataset.year  = m.year;
    btn.dataset.month = m.month;
    btn.addEventListener('click', function() {
      document.querySelectorAll('.mes-pill').forEach(p => p.classList.remove('activo'));
      btn.classList.add('activo');
      mesActivo = { year: m.year, month: m.month };
      cargarMes(m.year, m.month);
      entresemanaVisible = false;
      const te = document.getElementById('toggleEntresemana');
      const el = document.getElementById('entresemanaList');
      te.classList.remove('abierto');
      document.getElementById('toggleEntresemanaLabel').textContent = 'Mostrar entresemana';
      el.style.display = 'none';
    });
    container.appendChild(btn);
  });
}

// ── Carga de datos ──
function cargarMes(year, month) {
  const key = getMesKey(year, month);
  if (cargado[key]) { renderLista(); return; }

  renderCargando();
  const desde = fechaStr(year, month + 1, 1);
  const ultimo = new Date(year, month + 1, 0).getDate();
  const hasta  = fechaStr(year, month + 1, ultimo);

  fetch(API + '?action=disponibilidadObtener&desde=' + desde + '&hasta=' + hasta)
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        (data.fechas || []).forEach(f => {
          estadoGuardado[f.fecha] = f.estado;
          if (!(f.fecha in estadoActual)) {
            estadoActual[f.fecha] = f.estado;
          }
        });
        cargado[key] = true;
      } else {
        mostrarToast('Error al cargar: ' + (data.error || 'desconocido'), true);
      }
      renderLista();
    })
    .catch(() => {
      mostrarToast('Sin conexión. Verifica e intenta de nuevo.', true);
      renderLista();
    });
}

function renderCargando() {
  document.getElementById('findesList').innerHTML = '<div class="loading-row">Cargando...</div>';
  document.getElementById('entresemanaList').innerHTML = '';
}

// ── Render lista ──
function renderLista() {
  const dias  = getDiasDelMes(mesActivo.year, mesActivo.month);
  const hoy   = hoyStr();
  const mes   = getMesLabel(mesActivo.year, mesActivo.month);
  const finds = dias.filter(d => d.esFinde);
  const entre = dias.filter(d => !d.esFinde);

  document.getElementById('findesCount').textContent = finds.length + ' fechas';
  renderFechasList(document.getElementById('findesList'), finds, false);
  renderFechasList(document.getElementById('entresemanaList'), entre, true);

  // Actualizar toggle label
  document.getElementById('toggleEntresemanaLabel').textContent =
    entresemanaVisible ? 'Ocultar entresemana' : 'Mostrar ' + entre.length + ' días entresemana';

  // Botón guardar
  const n = getTotalCambios();
  const btn = document.getElementById('btnGuardar');
  btn.disabled = n === 0;
  btn.textContent = n === 0 ? 'Guardar' : 'Guardar (' + n + ')';

  // Render consulta si está activo
  if (modoActual === 'consulta') renderConsulta();
}

function renderFechasList(container, dias, compacta) {
  if (!dias.length) { container.innerHTML = '<div class="vacio">Sin fechas en este período.</div>'; return; }
  container.innerHTML = '';
  dias.forEach(d => {
    container.appendChild(crearFechaRow(d, compacta));
  });
}

function crearFechaRow(d, compacta) {
  const estado  = getEstado(d.fecha);
  const pasado  = esPasado(d.fecha);
  const cambiada = esCambiada(d.fecha);
  const bloqueadaClass = estado === 'bloqueada' ? 'bloqueada-row' : '';

  const row = document.createElement('div');
  row.className = [
    'fecha-row',
    compacta ? 'compacta' : '',
    cambiada  ? 'cambiada'  : '',
    pasado    ? 'pasada'    : '',
    bloqueadaClass,
  ].filter(Boolean).join(' ');
  row.dataset.fecha = d.fecha;

  // Fondo de swipe (visible mientras se arrastra)
  const swipeBg = document.createElement('div');
  swipeBg.className = 'swipe-bg';
  swipeBg.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
  row.appendChild(swipeBg);

  // Etiqueta
  const label = document.createElement('div');
  label.className = 'fecha-label';
  const dia = document.createElement('span');
  dia.className = 'fecha-dia';
  dia.textContent = d.label;
  label.appendChild(dia);
  row.appendChild(label);

  // Acciones
  const actions = document.createElement('div');
  actions.className = 'fecha-actions';

  // Botón Liberar (solo desktop, solo si bloqueada)
  if (estado === 'bloqueada' && !pasado) {
    const btnLib = document.createElement('button');
    btnLib.className = 'btn-liberar';
    btnLib.textContent = 'Liberar';
    btnLib.addEventListener('click', function(e) {
      e.stopPropagation();
      liberarFecha(d.fecha);
    });
    actions.appendChild(btnLib);
  }

  // Chip
  const chip = document.createElement('button');
  chip.className = 'chip ' + estado;
  chip.textContent = ETIQUETAS[estado];
  chip.disabled = pasado;
  if (!pasado) {
    chip.addEventListener('click', function() { ciclarEstado(d.fecha); });
  }
  actions.appendChild(chip);
  row.appendChild(actions);

  // Swipe (mobile unblock)
  if (!pasado && estado === 'bloqueada') {
    initSwipe(row, d.fecha);
  }

  return row;
}

// ── Tap-ciclo ──
function ciclarEstado(fecha) {
  if (esPasado(fecha)) return;
  const actual = getEstado(fecha);
  if (actual === 'bloqueada') return; // Solo swipe/Liberar desbloquea
  const idx = ESTADOS.indexOf(actual);
  const siguiente = ESTADOS[(idx + 1) % ESTADOS.length];
  estadoActual[fecha] = siguiente;
  renderLista();
}

// ── Liberar ──
function liberarFecha(fecha) {
  if (esPasado(fecha)) return;
  estadoActual[fecha] = 'libre';
  renderLista();
}

// ── Swipe (mobile) ──
function initSwipe(el, fecha) {
  let startX = null, startY = null, moved = false;

  el.addEventListener('touchstart', function(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved  = false;
  }, { passive: true });

  el.addEventListener('touchmove', function(e) {
    if (startX === null) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (dx > 10 && Math.abs(dy) < Math.abs(dx) * 0.7) {
      moved = true;
      const offset = Math.min(dx, 80);
      el.style.transform  = 'translateX(' + offset + 'px)';
      el.style.transition = 'none';
      el.classList.add('swiping');
      e.stopPropagation();
    }
  }, { passive: false });

  el.addEventListener('touchend', function(e) {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;

    el.style.transform  = '';
    el.style.transition = 'transform 0.15s ease';
    el.classList.remove('swiping');
    setTimeout(() => { el.style.transition = ''; }, 180);

    if (moved && dx >= 60 && Math.abs(dy) < Math.abs(dx) * 0.6) {
      liberarFecha(fecha);
    }
    startX = startY = null;
    moved  = false;
  }, { passive: true });
}

// ── Toggle entresemana ──
function toggleEntresemana() {
  entresemanaVisible = !entresemanaVisible;
  const el  = document.getElementById('entresemanaList');
  const btn = document.getElementById('toggleEntresemana');
  el.style.display = entresemanaVisible ? 'block' : 'none';
  btn.classList.toggle('abierto', entresemanaVisible);
  const dias = getDiasDelMes(mesActivo.year, mesActivo.month).filter(d => !d.esFinde);
  document.getElementById('toggleEntresemanaLabel').textContent =
    entresemanaVisible ? 'Ocultar entresemana' : 'Mostrar ' + dias.length + ' días entresemana';
}

// ── Modo consulta / captura ──
function setModo(modo, btn) {
  modoActual = modo;
  document.querySelectorAll('.btn-modo').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  document.getElementById('mainCaptura').style.display  = modo === 'captura' ? 'block' : 'none';
  document.getElementById('mainConsulta').style.display = modo === 'consulta' ? 'block' : 'none';
  if (modo === 'consulta') renderConsulta();
}

function renderConsulta() {
  const wrap = document.getElementById('consultaWrap');
  const dias  = getDiasDelMes(mesActivo.year, mesActivo.month);
  const mes   = getMesLabel(mesActivo.year, mesActivo.month);

  const header = document.createElement('div');
  header.className = 'consulta-header';
  header.textContent = mes + ' ' + mesActivo.year;
  wrap.innerHTML = '';
  wrap.appendChild(header);

  const card = document.createElement('div');
  card.className = 'fechas';

  let hayContenido = false;
  dias.forEach(d => {
    const estado = getEstado(d.fecha);
    const item   = document.createElement('div');
    item.className = 'consulta-item';
    const diaSpan = document.createElement('span');
    diaSpan.className = 'consulta-dia';
    diaSpan.textContent = d.label;
    const estadoSpan = document.createElement('span');
    estadoSpan.className = 'consulta-estado ' + estado;
    estadoSpan.textContent = ETIQUETAS[estado];
    item.appendChild(diaSpan);
    item.appendChild(estadoSpan);
    card.appendChild(item);
    hayContenido = true;
  });

  if (!hayContenido) {
    card.innerHTML = '<div class="vacio">Sin fechas en este mes.</div>';
  }
  wrap.appendChild(card);
}

function copiarRespuesta() {
  const dias  = getDiasDelMes(mesActivo.year, mesActivo.month);
  const mes   = getMesLabel(mesActivo.year, mesActivo.month).toLowerCase();
  const hoy   = hoyStr();
  const lineas = [];

  dias.forEach(d => {
    if (d.fecha < hoy) return;
    const estado = getEstado(d.fecha);
    const dow    = d.dow;
    const diaNum = parseInt(d.fecha.split('-')[2]);
    const diaLargo = DIAS_LARGO[dow] + ' ' + diaNum;
    lineas.push('- ' + diaLargo + ': ' + ETIQUETAS_WA[estado] + '.');
  });

  if (!lineas.length) {
    mostrarToast('No hay fechas futuras en este mes.', true);
    return;
  }

  const mensaje =
    'Disponibilidad en Safi Metropolitan, ' + mes + ' ' + mesActivo.year + ':\n\n' +
    lineas.join('\n') +
    '\n\nSi quieres apartar una fecha avísanos para mandarte la propuesta.';

  navigator.clipboard.writeText(mensaje)
    .then(() => mostrarToast('Mensaje copiado al portapapeles'))
    .catch(() => {
      // Fallback para navegadores sin clipboard API
      const ta = document.createElement('textarea');
      ta.value = mensaje;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); mostrarToast('Mensaje copiado'); }
      catch(e) { mostrarToast('No se pudo copiar. Copia el texto manualmente.', true); }
      document.body.removeChild(ta);
    });
}

// ── Diff ──
document.getElementById('btnGuardar').addEventListener('click', function() {
  const cambios = getCambios();
  if (!cambios.length) return;
  abrirDiff(cambios);
});

function abrirDiff(cambios) {
  const n = cambios.length;
  document.getElementById('diffSubtitle').textContent =
    n + ' cambio' + (n === 1 ? '' : 's') + ' antes de guardar';

  const dias   = getDiasDelMes(mesActivo.year, mesActivo.month);
  const labels = {};
  // Build label map for all loaded months
  getMesesActivos().forEach(m => {
    getDiasDelMes(m.year, m.month).forEach(d => { labels[d.fecha] = d.label + ' ' + MESES_NOMBRES[m.month].substring(0,3).toLowerCase(); });
  });

  document.getElementById('diffList').innerHTML = cambios.map(c => {
    const label = labels[c.fecha] || c.fecha;
    return `
      <div class="diff-item">
        <span class="diff-fecha">${label}</span>
        <div class="diff-cambio">
          <span class="diff-chip" style="background:var(--${c.antes}-soft);color:var(--${c.antes})">${ETIQUETAS[c.antes]}</span>
          <span class="arrow-icon">→</span>
          <span class="diff-chip" style="background:var(--${c.ahora}-soft);color:var(--${c.ahora})">${ETIQUETAS[c.ahora]}</span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('diffOverlay').classList.add('visible');
}

function cerrarDiff() {
  document.getElementById('diffOverlay').classList.remove('visible');
}

// ── Guardar ──
function confirmarGuardar() {
  const cambios = getCambios();
  if (!cambios.length) return;

  const btnConf = document.getElementById('btnConfirmar');
  btnConf.disabled = true;
  btnConf.textContent = 'Guardando...';

  const payload = {
    action   : 'disponibilidadGuardar',
    adminKey : PASSWORD,
    usuario  : usuario,
    cambios  : cambios.map(c => ({ fecha: c.fecha, estado: c.ahora })),
  };

  fetch(API, {
    method : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body   : JSON.stringify(payload),
  })
  .then(r => r.json())
  .then(data => {
    btnConf.disabled = false;
    btnConf.textContent = 'Confirmar y guardar';
    cerrarDiff();

    if (data.ok) {
      // Sincronizar guardado con lo que se aplicó
      cambios.forEach(c => {
        if (c.ahora === 'libre') {
          delete estadoGuardado[c.fecha];
          delete estadoActual[c.fecha];
        } else {
          estadoGuardado[c.fecha] = c.ahora;
          estadoActual[c.fecha]   = c.ahora;
        }
      });
      const n = data.procesados;
      mostrarToast(n + ' cambio' + (n === 1 ? '' : 's') + ' guardado' + (n === 1 ? '' : 's'));
      renderLista();
    } else {
      mostrarToast('Error al guardar: ' + (data.error || 'desconocido'), true);
    }
  })
  .catch(() => {
    btnConf.disabled = false;
    btnConf.textContent = 'Confirmar y guardar';
    cerrarDiff();
    mostrarToast('Error de conexión. Los cambios no se perdieron.', true);
  });
}

// ── Toast ──
let toastTimer = null;
function mostrarToast(msg, error) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast visible' + (error ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('visible'); }, 2400);
}

// ── Advertencia al cerrar con cambios pendientes ──
window.addEventListener('beforeunload', function(e) {
  if (getTotalCambios() > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

(function() {
  let ok = false;
  try { ok = localStorage.getItem('pi_admin_ok') === '1' || localStorage.getItem('pi_disp_ok') === '1'; } catch (e) {}

    }
  }
})();
